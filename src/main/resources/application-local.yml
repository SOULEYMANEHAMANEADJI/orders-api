# Profile: local
# This file is intended for local development only. It reads DB connection
# parameters from environment variables (DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD)
# Do NOT commit secrets. Keep a safe .env (ignored by git) with production values.

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/${DB_NAME:rest_api_orders_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:Admin$123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

server:
  port: 8633

