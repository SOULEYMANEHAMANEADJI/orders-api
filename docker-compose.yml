services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:Admin$123}"
      MYSQL_DATABASE: "rest_api_orders_db"
    ports:
      - "${DB_PORT_EXTERNAL:-3308}:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./src/main/resources/db/migration/V1__init.sql:/docker-entrypoint-initdb.d/V1__init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    image: rest-api-orders:latest
    ports:
      - "${APP_PORT:-8633}:8633"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: "prod"
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/rest_api_orders_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
      SPRING_DATASOURCE_USERNAME: "${DB_USER:-root}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-Admin$123}"
      FLYWAY_ENABLED: "true"
      HIKARI_MAX_POOL_SIZE: "10"
      HIKARI_MIN_IDLE: "2"
      JWT_SECRET: "${JWT_SECRET:-404d6c756f2f4c756f2f4c756f000102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20}"
      JWT_EXPIRATION_MS: "${JWT_EXPIRATION_MS:-86400000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8633/api/v1/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  db-data:




